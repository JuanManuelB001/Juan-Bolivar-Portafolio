<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />

    <title>Portafolio Juan Manuel Bolivar</title>
  </head>
  <body>
    <header class="header" id="header">
      <div class="container-nav">
        <input type="checkbox" class="header-checkbox" id="open-menu" />
        <label
          for="open-menu"
          class="header-open-nav-button"
          role="button"
          aria-label="Open Menu"
          >=</label
        >
        <div class="header-logo-container">
          <img
            class="header-logo"
            src="./img/ww_logo.png"
            alt="Image Container"
          />
        </div>

        
        <nav class="header-nav" id="header-nav">
          <ul class="header-nav-list">
        </nav>
        <div class="header-button-container">
          <button onclick="changeLenguajes()" class="button-lenguaje">
            <p class="button-lenguajes"></p>
          </button>
          <input
            type="image"
            src="img/dark_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.png"
            class="darkmode-button"
          />
          <a href="pdf/" class="download-curriculum">dw curriculom</a>
        </div>
      </div>
    </header>
    <main class="profile" id="profile">
      <div class="profile-wrapper">
        <div class="profile-img-container">
          <img
            src="img/programador.png"
            alt="img_juan_bolivar_imagen"
            class="profile-img"
          />
          <div class="profile-overlay">
            <div class="profile-badges">
              <span class="profile-badge span-1">fdsgdfs</span>
              <span class="profile-badge span-1">fdsgdfs</span>
              <span class="profile-badge span-1">fdsgdfs</span>
              <span class="profile-badge span-1">fdsgdfs</span>
            </div>
          </div>
        </div>

        <div class="profile-data-container">
          <div class="profile-data">
            <div class="profile-descripction">
              <h1 class="name"></h1>
              <h2 id="title"></h2>
              
              <div class="profile-title">
                <div class="indicators">
                  <div class="experience">
                    <p
                      class="experience indicators-number indicator-number"
                    ></p>
                    <p class="experience-label indicator-label"></p>
                  </div>
                </div>
                <div class="indicators">
                  <div class="tecnology">
                    <p class="indicators-number tecnology-number"></p>
                    <p class="indicator-label tecnology-label"></p>
                  </div>
                </div>
              </div>
              <div class="text-container">
                <p class="profile-summary"></p>
              </div>
            </div>

            <div class="profile-sections">
              <div class="profile-techologies">
                <h2 class="h2-skills"></h2>

                <!-- FRONTEND -->
                <div class="tech-category">
                  <h3 class="title-skills frontend"></h3>
                  <ul class="list-frontend"></ul>
                </div>
                <!-- BACKEND -->
                <div class="tech-category">
                  <h3 class="title-skills backend"></h3>
                  <ul class="list-backend"></ul>
                </div>

                <!-- DATABASES -->
                <div class="tech-category">
                  <h3 class="title-skills database"></h3>
                  <ul class="list-databases"></ul>
                </div>
              </div>
              <!-- STUDIES -->
              <div class="studies-container">
                <h2 class="studies-title"></h2>
                <div class="studies"></div>
              </div>

              <div class="profile-framework">
                <h2 class="framework-title"></h2>
                <div class="tools-container"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- CONTACT-->
     <section class="section-container" >
      <h2 class="professional-experience"></h2>

      <div class="jobs-container">
        <div class="section-wrapper"></div>
      </div>
     </section>

     <script src="js/lenguajes.js"></script>
    <!--  DARK MODE -->
      <script src="js/darkMode.js"></script>
  </body>
</html>
